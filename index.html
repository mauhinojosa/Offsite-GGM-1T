    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    }

    console.error('Bundle unpack error:', err);

 padding-top:0;\n  }\n  .tstop .when{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.22em;\n    text-transform:uppercase;\n    color:var(--muted-dark);\n    margin-bottom:24px;\n  }\n  .tstop .node{\n    width:14px;height:14px;border-radius:50%;\n    border:1px solid var(--line-dark-strong);\n    background:var(--ink);\n    position:relative;\n    margin-bottom:24px;\n  }\n  .tstop.now .node{\n    background:var(--fg-dark);\n    border-color:var(--fg-dark);\n    box-shadow:0 0 0 6px rgba(237,234,226,.08);\n  }\n  .tstop .label{\n    font-family:var(--mono);\n    font-size:11px;\n    letter-spacing:.22em;\n    text-transform:uppercase;\n    color:var(--fg-dark);\n    font-weight:500;\n    margin-bottom:6px;\n  }\n  .tstop .desc{\n    font-family:var(--sans);\n    font-size:13.5px;\n    line-height:1.5;\n    color:var(--muted-dark);\n    max-width:24ch;\n  }\n  .tstop.now .desc{ color:var(--fg-dark); }\n\n  /* ---------- Closing (dark) ---------- */\n  .closing{\n    padding:80px 0 96px;\n    border-top:1px solid var(--line-dark);\n  }\n  .closing-grid{\n    display:grid;\n    grid-template-columns:1.2fr 1fr;\n    gap:64px;\n    align-items:end;\n  }\n  .closing .body p{\n    margin:0 0 18px 0;\n    font-family:var(--sans);\n    font-size:16px;\n    line-height:1.6;\n    color:var(--fg-dark);\n    max-width:56ch;\n  }\n  .closing .sign{\n    border-top:1px solid var(--fg-dark);\n    padding-top:24px;\n  }\n  .closing .sign .line{\n    font-family:var(--serif);\n    font-style:italic;\n    font-size:24px;\n    line-height:1.25;\n    color:var(--fg-dark);\n    margin-bottom:18px;\n  }\n  .closing .sign .line em{ color:var(--muted-dark); font-style:italic; }\n  .closing .sign .who{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.22em;\n    text-transform:uppercase;\n    color:var(--muted-dark);\n    line-height:1.8;\n  }\n  .closing .sign .who b{ color:var(--fg-dark); font-weight:500; display:block; }\n\n  /* ---------- Footer (dark) ---------- */\n  footer.dark{\n    border-top:1px solid var(--line-dark);\n    padding:24px 0;\n  }\n  .foot-row{\n    display:flex;\n    justify-content:space-between;\n    align-items:center;\n    gap:24px;\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.22em;\n    text-transform:uppercase;\n    color:var(--muted-dark);\n  }\n  .foot-row b{ color:var(--fg-dark); font-weight:500; }\n\n  /* ---------- Tiny ascii rule ---------- */\n  .ascii-rule{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.4em;\n    color:var(--muted-dark);\n    margin:0;\n  }\n\n  /* ---------- Responsive ---------- */\n  @media (max-width: 880px){\n    .wrap{ padding:0 24px; }\n    .hero{ padding:64px 0 56px; }\n    .hero h1{ font-size:54px; }\n    .hero .meta-row{ grid-template-columns:repeat(2,1fr); gap:20px; }\n    .masthead-grid{ grid-template-columns:1fr; }\n    .masthead-grid .mid, .masthead-grid .right{ text-align:left; }\n    .letter-grid{ grid-template-columns:1fr; gap:32px; }\n    .commit-grid{ grid-template-columns:1fr; }\n    .commit{ border-right:0; border-bottom:1px solid var(--line-dark); }\n    .commit:last-child{ border-bottom:0; }\n    .diagram-band .head{ grid-template-columns:1fr; }\n    .diagram-band .head .r{ text-align:left; }\n    .diagram-legend{ grid-template-columns:repeat(2,1fr); }\n    .ask-list{ grid-template-columns:1fr; }\n    .ask + .ask{ padding-left:0; border-left:0; }\n    .timeline-line{ display:none; }\n    .timeline-grid{ grid-template-columns:1fr; gap:32px; }\n    .closing-grid{ grid-template-columns:1fr; gap:40px; align-items:start; }\n    .quote{ padding:80px 0; }\n    .letter{ padding:80px 0; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n\n\n<body>\n\n<!-- ============== HERO / MASTHEAD (DARK) ============== -->\n<section class=\"dark\" data-screen-label=\"01 Hero\">\n  <div class=\"wrap masthead\" style=\"position:relative;\">\n    <div class=\"brackets\"><i><\u002Fi><\u002Fdiv>\n    <div class=\"masthead-grid\">\n      <div class=\"left\">\n        <b>Grupo Garza Mercado<\u002Fb>\n        Comunicado interno\n      <\u002Fdiv>\n      <div class=\"mid\">\n        <b>Offsite<\u002Fb>\n        Mayo 2026\n      <\u002Fdiv>\n      <div class=\"right\">\n        <b>Santiago, N.L.<\u002Fb>\n        13–15 Mayo 2026\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap hero\">\n    <div class=\"eyebrow\">— Memorandum de Offsite GGM 1T · Mayo 2026<\u002Fdiv>\n    <h1>\n      Operación Transversal,<br>\n      <em>IA y Tecnología.<\u002Fem>\n    <\u002Fh1>\n    <p class=\"sub\">\n      Síntesis de acuerdos.\n    <\u002Fp>\n\n    <div class=\"meta-row\">\n      <div class=\"meta-cell\"><b>Quiénes<\u002Fb>Directores GGM + GMC + GMD<\u002Fdiv>\n      <div class=\"meta-cell\"><b>Cuándo<\u002Fb>13–15 Mayo 2026<\u002Fdiv>\n      <div class=\"meta-cell\"><b>Dónde<\u002Fb>Santiago, Nuevo León<\u002Fdiv>\n      <div class=\"meta-cell\"><b>Para qué<\u002Fb>Alinear la operación<br>transversal del grupo<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== DIAGRAM BAND ============== -->\n  <div class=\"wrap diagram-band\">\n    <div class=\"head\">\n      <div class=\"l\">\n        <b>01 · Punto de partida<\u002Fb>\n        <h2>Sistema fragmentado.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"r\">\n        <b>02 · Destino<\u002Fb>\n        <h2>Sistema inteligente <em>y conectado.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Abstract diagram: scattered dots → funnel → ordered network -->\n    <svg class=\"diagram\" viewBox=\"0 0 1240 320\" preserveAspectRatio=\"xMidYMid meet\" aria-hidden=\"true\">\n      <defs>\n        <radialGradient id=\"cloud\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n          <stop offset=\"0%\" stop-color=\"#EDEAE2\" stop-opacity=\"0.9\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#EDEAE2\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FradialGradient>\n      <\u002Fdefs>\n\n      <!-- Left: fragmented scatter -->\n      <g id=\"scatter\" fill=\"#EDEAE2\">\n        <!-- generated cluster of small squares/dots -->\n      <\u002Fg>\n\n      <!-- Middle: funnel passing through \"intención compartida\" -->\n      <g stroke=\"rgba(237,234,226,.35)\" stroke-width=\"0.6\" fill=\"none\">\n        <path d=\"M 360,40 C 480,80 560,140 620,160\"><\u002Fpath>\n        <path d=\"M 360,80 C 480,100 560,150 620,160\"><\u002Fpath>\n        <path d=\"M 360,120 C 480,130 560,155 620,160\"><\u002Fpath>\n        <path d=\"M 360,160 C 480,160 560,160 620,160\"><\u002Fpath>\n        <path d=\"M 360,200 C 480,190 560,165 620,160\"><\u002Fpath>\n        <path d=\"M 360,240 C 480,220 560,170 620,160\"><\u002Fpath>\n        <path d=\"M 360,280 C 480,250 560,180 620,160\"><\u002Fpath>\n\n        <path d=\"M 620,160 C 680,180 760,250 880,280\"><\u002Fpath>\n        <path d=\"M 620,160 C 680,170 760,220 880,240\"><\u002Fpath>\n        <path d=\"M 620,160 C 680,165 760,190 880,200\"><\u002Fpath>\n        <path d=\"M 620,160 C 680,160 760,160 880,160\"><\u002Fpath>\n        <path d=\"M 620,160 C 680,155 760,130 880,120\"><\u002Fpath>\n        <path d=\"M 620,160 C 680,150 760,100 880,80\"><\u002Fpath>\n        <path d=\"M 620,160 C 680,140 760,70 880,40\"><\u002Fpath>\n      <\u002Fg>\n\n      <!-- Center node -->\n      <g>\n        <circle cx=\"620\" cy=\"160\" r=\"36\" fill=\"none\" stroke=\"#EDEAE2\" stroke-width=\"1\"><\u002Fcircle>\n        <circle cx=\"620\" cy=\"160\" r=\"2\" fill=\"#EDEAE2\"><\u002Fcircle>\n        <text x=\"620\" y=\"220\" text-anchor=\"middle\" fill=\"#EDEAE2\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" letter-spacing=\"1.6\">\n          INTENCIÓN COMPARTIDA\n        <\u002Ftext>\n      <\u002Fg>\n\n      <!-- Right: ordered network on right side -->\n      <g id=\"network\" stroke=\"rgba(237,234,226,.45)\" stroke-width=\"0.6\" fill=\"#EDEAE2\">\n        <!-- 5 anchor nodes representing the 5 commitments -->\n        <circle cx=\"880\" cy=\"40\" r=\"2.5\"><\u002Fcircle>\n        <circle cx=\"880\" cy=\"120\" r=\"2.5\"><\u002Fcircle>\n        <circle cx=\"880\" cy=\"160\" r=\"2.5\"><\u002Fcircle>\n        <circle cx=\"880\" cy=\"200\" r=\"2.5\"><\u002Fcircle>\n        <circle cx=\"880\" cy=\"240\" r=\"2.5\"><\u002Fcircle>\n        <circle cx=\"880\" cy=\"280\" r=\"2.5\"><\u002Fcircle>\n\n        <!-- connections to a single-source-of-truth node -->\n        <line x1=\"880\" y1=\"40\" x2=\"1080\" y2=\"160\"><\u002Fline>\n        <line x1=\"880\" y1=\"120\" x2=\"1080\" y2=\"160\"><\u002Fline>\n        <line x1=\"880\" y1=\"160\" x2=\"1080\" y2=\"160\"><\u002Fline>\n        <line x1=\"880\" y1=\"200\" x2=\"1080\" y2=\"160\"><\u002Fline>\n        <line x1=\"880\" y1=\"240\" x2=\"1080\" y2=\"160\"><\u002Fline>\n        <line x1=\"880\" y1=\"280\" x2=\"1080\" y2=\"160\"><\u002Fline>\n\n        <circle cx=\"1080\" cy=\"160\" r=\"22\" fill=\"none\" stroke=\"#EDEAE2\" stroke-width=\"1\"><\u002Fcircle>\n        <circle cx=\"1080\" cy=\"160\" r=\"2\" fill=\"#EDEAE2\"><\u002Fcircle>\n        <text x=\"1080\" y=\"210\" text-anchor=\"middle\" fill=\"#EDEAE2\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" letter-spacing=\"1.6\">\n          SINGLE SOURCE OF TRUTH\n        <\u002Ftext>\n      <\u002Fg>\n\n      <!-- Stage labels along top -->\n      <g font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" letter-spacing=\"1.6\" fill=\"#8A8A82\">\n        <text x=\"380\" y=\"20\">PAUSA<\u002Ftext>\n        <text x=\"480\" y=\"20\">ALINEACIÓN<\u002Ftext>\n        <text x=\"600\" y=\"20\">DECISIONES<\u002Ftext>\n        <text x=\"720\" y=\"20\">EJECUCIÓN<\u002Ftext>\n      <\u002Fg>\n\n      <!-- Axis -->\n      <g stroke=\"rgba(237,234,226,.2)\">\n        <line x1=\"20\" y1=\"305\" x2=\"320\" y2=\"305\"><\u002Fline>\n      <\u002Fg>\n      <g font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" letter-spacing=\"1.4\" fill=\"#8A8A82\">\n        <text x=\"20\" y=\"318\">−3<\u002Ftext>\n        <text x=\"80\" y=\"318\">−2<\u002Ftext>\n        <text x=\"140\" y=\"318\">−1<\u002Ftext>\n        <text x=\"200\" y=\"318\">0<\u002Ftext>\n        <text x=\"260\" y=\"318\">+1<\u002Ftext>\n        <text x=\"20\" y=\"298\" font-size=\"7\">NIVEL DE MADUREZ OPERATIVA<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n\n    <script>\n      // Populate the scattered cloud with deterministic random-looking dots\n      (function(){\n        const g = document.getElementById('scatter');\n        if(!g) return;\n        // simple LCG for stable layout\n        let s = 1337;\n        const rnd = () => (s = (s*9301 + 49297) % 233280) / 233280;\n        const cx = 180, cy = 160, w = 280, h = 260;\n        const N = 320;\n        let svgns = \"http://www.w3.org/2000/svg\";\n        for(let i=0;i<N;i++){\n          const r1 = rnd();\n          const r2 = rnd();\n          // bias density toward center\n          const ang = r1 * Math.PI * 2;\n          const rad = Math.pow(r2, 0.6) * (w/2);\n          const x = cx + Math.cos(ang) * rad + (rnd()-.5)*30;\n          const y = cy + Math.sin(ang) * (h/2/(w/2)) * rad + (rnd()-.5)*20;\n          const size = rnd() < .85 ? 1.2 : (rnd() < .7 ? 2 : 3);\n          const op = 0.35 + rnd()*0.6;\n          const shape = rnd() < .25 ? 'rect' : 'circle';\n          if(shape === 'rect'){\n            const r = document.createElementNS(svgns,'rect');\n            r.setAttribute('x', x - size/2);\n            r.setAttribute('y', y - size/2);\n            r.setAttribute('width', size);\n            r.setAttribute('height', size);\n            r.setAttribute('fill-opacity', op);\n            g.appendChild(r);\n          } else {\n            const c = document.createElementNS(svgns,'circle');\n            c.setAttribute('cx', x);\n            c.setAttribute('cy', y);\n            c.setAttribute('r', size/2);\n            c.setAttribute('fill-opacity', op);\n            g.appendChild(c);\n          }\n        }\n      })();\n    <\u002Fscript>\n\n    <div class=\"diagram-legend\">\n      <div><b>+ Datos dispersos<\u002Fb>Información no confiable<\u002Fdiv>\n      <div><b>+ Procesos aislados<\u002Fb>Esfuerzo duplicado<\u002Fdiv>\n      <div><b>+ Plataforma común<\u002Fb>Equipos alineados<\u002Fdiv>\n      <div><b>+ IA con criterio<\u002Fb>Ventaja sostenible<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== CONTEXTO Y PROPÓSITO (CREAM) ============== -->\n<section class=\"cream letter\" data-screen-label=\"02 Contexto\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">— 02 · Contexto y propósito<\u002Fdiv>\n      <h2>Contexto <em>y propósito.<\u002Fem><\u002Fh2>\n      <div class=\"r\">— Offsite 1T · Mayo 2026<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"context-body\">\n      <p class=\"opener\">\n        Durante tres días, los equipos directivos de GM Capital y\n        GM Desarrollos nos reunimos en un <em>offsite intermedio<\u002Fem>\n        con dos objetivos centrales.\n      <\u002Fp>\n      <p>\n        Primero, <strong>alinear la operación transversal del grupo<\u002Fstrong>:\n        datos, plataformas, servicios compartidos y comunicación.\n        Segundo, reflexionar sobre el impacto real que la inteligencia\n        artificial tiene hoy en los negocios — y lo que implica\n        quedarse atrás.\n      <\u002Fp>\n      <p>\n        Este documento recoge los temas más relevantes que se\n        discutieron y los acuerdos concretos a los que llegamos.\n        No es una lista exhaustiva de todo lo que se habló:\n        es una síntesis de lo que acordamos hacer diferente a\n        partir de ahora.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== COMMITMENTS (DARK) ============== -->\n<section class=\"dark commitments\" data-screen-label=\"03 Compromisos\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">— 03 · Nuestros cuatro compromisos<\u002Fdiv>\n      <h2>Lo que va <em>a evolucionar.<\u002Fem><\u002Fh2>\n      <div class=\"r\">— Aterriza<br>May–Nov 2026<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"commit-grid\">\n\n      <!-- 01 -->\n      <article class=\"commit\">\n        <div class=\"commit-num\"><span class=\"dot\"><\u002Fspan>01 — Ordenar nuestra información<\u002Fdiv>\n        <h3>Vamos a ordenar <em>nuestros datos.<\u002Fem><\u002Fh3>\n        <p>\n          Hoy la información del grupo está dispersa y con errores.\n          Empezamos un proyecto formal para limpiarla, estructurarla\n          y protegerla. <strong>Arrancó el 18 de mayo.<\u002Fstrong>\n        <\u002Fp>\n\n        <div class=\"commit-viz\" data-viz=\"order\">\n          <!-- left: messy grid → right: ordered grid -->\n          <svg viewBox=\"0 0 480 120\" preserveAspectRatio=\"xMidYMid meet\" aria-hidden=\"true\">\n            <g id=\"messy-grid\" fill=\"#EDEAE2\"><\u002Fg>\n            <!-- arrow -->\n            <g stroke=\"#8A8A82\" stroke-width=\"0.8\" fill=\"none\">\n              <line x1=\"220\" y1=\"60\" x2=\"270\" y2=\"60\"><\u002Fline>\n              <polyline points=\"262,55 270,60 262,65\"><\u002Fpolyline>\n            <\u002Fg>\n            <g id=\"ordered-grid\" fill=\"#EDEAE2\"><\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"commit-tag\"><b>Estatus —<\u002Fb> En marcha desde el 18 de mayo<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- 02 -->\n      <article class=\"commit\">\n        <div class=\"commit-num\"><span class=\"dot\"><\u002Fspan>02 — Plataforma común<\u002Fdiv>\n        <h3>Notion como <em>nuestra biblioteca.<\u002Fem><\u002Fh3>\n        <p>\n          Manuales, políticas, directorio y minutas en un solo lugar.\n          Va a haber talleres para que aprendan a usarlo —\n          adaptado a cada área, a todos los niveles.\n        <\u002Fp>\n\n        <div class=\"commit-viz\">\n          <svg viewBox=\"0 0 480 120\" preserveAspectRatio=\"xMidYMid meet\" aria-hidden=\"true\">\n            <!-- center hex -->\n            <g stroke=\"#EDEAE2\" stroke-width=\"1\" fill=\"none\">\n              <polygon points=\"240,30 270,47 270,83 240,100 210,83 210,47\"><\u002Fpolygon>\n            <\u002Fg>\n            <text x=\"240\" y=\"62\" text-anchor=\"middle\" fill=\"#EDEAE2\" font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" letter-spacing=\"1.4\">NOTION<\u002Ftext>\n            <text x=\"240\" y=\"74\" text-anchor=\"middle\" fill=\"#EDEAE2\" font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" letter-spacing=\"1.4\">GGM<\u002Ftext>\n\n            <g stroke=\"rgba(237,234,226,.45)\" stroke-width=\"0.7\">\n              <line x1=\"210\" y1=\"55\" x2=\"110\" y2=\"30\"><\u002Fline>\n              <line x1=\"210\" y1=\"75\" x2=\"110\" y2=\"65\"><\u002Fline>\n              <line x1=\"210\" y1=\"90\" x2=\"110\" y2=\"100\"><\u002Fline>\n              <line x1=\"270\" y1=\"55\" x2=\"370\" y2=\"30\"><\u002Fline>\n              <line x1=\"270\" y1=\"75\" x2=\"370\" y2=\"65\"><\u002Fline>\n              <line x1=\"270\" y1=\"90\" x2=\"370\" y2=\"100\"><\u002Fline>\n            <\u002Fg>\n            <g font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" letter-spacing=\"1.2\" fill=\"#EDEAE2\">\n              <text x=\"100\" y=\"32\" text-anchor=\"end\">POLÍTICAS<\u002Ftext>\n              <text x=\"100\" y=\"67\" text-anchor=\"end\">PROYECTOS<\u002Ftext>\n              <text x=\"100\" y=\"102\" text-anchor=\"end\">MINUTAS<\u002Ftext>\n              <text x=\"380\" y=\"32\">CONOCIMIENTO<\u002Ftext>\n              <text x=\"380\" y=\"67\">PROCESOS<\u002Ftext>\n              <text x=\"380\" y=\"102\">DOCUMENTOS<\u002Ftext>\n            <\u002Fg>\n            <g fill=\"#EDEAE2\">\n              <circle cx=\"100\" cy=\"30\" r=\"2\"><\u002Fcircle>\n              <circle cx=\"100\" cy=\"65\" r=\"2\"><\u002Fcircle>\n              <circle cx=\"100\" cy=\"100\" r=\"2\"><\u002Fcircle>\n              <circle cx=\"380\" cy=\"30\" r=\"2\"><\u002Fcircle>\n              <circle cx=\"380\" cy=\"65\" r=\"2\"><\u002Fcircle>\n              <circle cx=\"380\" cy=\"100\" r=\"2\"><\u002Fcircle>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"commit-tag\"><b>Estatus —<\u002Fb> Roll-out con talleres por área<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- 03 -->\n      <article class=\"commit\">\n        <div class=\"commit-num\"><span class=\"dot\"><\u002Fspan>03 — Personas y Cultura<\u002Fdiv>\n        <h3>Hacia <em>Personas y Cultura.<\u002Fem><\u002Fh3>\n        <p>\n          Recursos Humanos evoluciona hacia una función más\n          <strong>estratégica a nivel grupo<\u002Fstrong>: pasa de administración\n          operativa a <strong>personas, cultura, retención y crecimiento\n          de talento<\u002Fstrong>. Como parte de esto, se centraliza\n          a nivel corporativo bajo una sola estructura.\n        <\u002Fp>\n        <p>\n          También se acordó establecer <strong>valores compartidos para\n          todo GGM<\u002Fstrong>, alineados y bajados de forma consistente\n          a todas las empresas del grupo.\n        <\u002Fp>\n\n        <div class=\"commit-viz\">\n          <svg viewBox=\"0 0 480 120\" preserveAspectRatio=\"xMidYMid meet\" aria-hidden=\"true\">\n            <!-- diverging strands → ellipse \"lens\" → converging strands -->\n            <g stroke=\"rgba(237,234,226,.5)\" stroke-width=\"0.7\" fill=\"none\">\n              <path d=\"M 30,30  C 130,30  170,55 240,60\"><\u002Fpath>\n              <path d=\"M 30,50  C 130,50  170,57 240,60\"><\u002Fpath>\n              <path d=\"M 30,70  C 130,70  170,63 240,60\"><\u002Fpath>\n              <path d=\"M 30,90  C 130,90  170,65 240,60\"><\u002Fpath>\n\n              <path d=\"M 240,60 C 310,55  350,30 450,30\"><\u002Fpath>\n              <path d=\"M 240,60 C 310,57  350,50 450,50\"><\u002Fpath>\n              <path d=\"M 240,60 C 310,63  350,70 450,70\"><\u002Fpath>\n              <path d=\"M 240,60 C 310,65  350,90 450,90\"><\u002Fpath>\n            <\u002Fg>\n            <ellipse cx=\"240\" cy=\"60\" rx=\"28\" ry=\"36\" stroke=\"#EDEAE2\" stroke-width=\"1\" fill=\"none\"><\u002Fellipse>\n            <g fill=\"#EDEAE2\">\n              <circle cx=\"30\" cy=\"30\" r=\"1.6\"><\u002Fcircle>\n              <circle cx=\"30\" cy=\"50\" r=\"1.6\"><\u002Fcircle>\n              <circle cx=\"30\" cy=\"70\" r=\"1.6\"><\u002Fcircle>\n              <circle cx=\"30\" cy=\"90\" r=\"1.6\"><\u002Fcircle>\n              <circle cx=\"450\" cy=\"30\" r=\"1.6\"><\u002Fcircle>\n              <circle cx=\"450\" cy=\"50\" r=\"1.6\"><\u002Fcircle>\n              <circle cx=\"450\" cy=\"70\" r=\"1.6\"><\u002Fcircle>\n              <circle cx=\"450\" cy=\"90\" r=\"1.6\"><\u002Fcircle>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"commit-tag\"><b>Estatus —<\u002Fb> Valores GGM y nueva estructura en diseño<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- 04 -->\n      <article class=\"commit\">\n        <div class=\"commit-num\"><span class=\"dot\"><\u002Fspan>04 — Inteligencia Artificial<\u002Fdiv>\n        <h3>Vamos a usar IA, <em>con orden.<\u002Fem><\u002Fh3>\n        <p>\n          La IA ya está en muchos trabajos. La vamos a integrar\n          con seguridad y datos limpios primero.\n          <strong>Por ahora no se asignan cuentas individuales<\u002Fstrong>\n          — estamos evaluando una a nivel grupo.\n        <\u002Fp>\n\n        <div class=\"commit-viz\" data-viz=\"net\">\n          <svg viewBox=\"0 0 480 120\" preserveAspectRatio=\"xMidYMid meet\" aria-hidden=\"true\">\n            <!-- neural net 4-5-5-4 -->\n            <g id=\"net\" stroke=\"rgba(237,234,226,.35)\" stroke-width=\"0.5\" fill=\"#EDEAE2\"><\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"commit-tag\"><b>Estatus —<\u002Fb> Evaluación de IA grupal en curso<\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== PULL QUOTE (CREAM) ============== -->\n<section class=\"quote\" data-screen-label=\"04 Frase\">\n  <div class=\"wrap\">\n    <p class=\"ascii-rule\">— — —   PRINCIPIO RECTOR   — — —<\u002Fp>\n    <div class=\"rule\" style=\"margin:24px auto 48px;\"><\u002Fdiv>\n    <blockquote>\n      <span class=\"punct\">“<\u002Fspan>Los datos son parte\n      del patrimonio del grupo. Cuidarlos y usarlos bien\n      es una decisión <em>estratégica<\u002Fem>, no un tema de tecnología.<span class=\"punct\">”<\u002Fspan>\n    <\u002Fblockquote>\n    <div class=\"attrib\">— Dirección General GGM · Mayo 2026<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ASKS (CREAM PAPER) ============== -->\n<section class=\"cream-paper asks\" data-screen-label=\"05 Lo que pedimos\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">— 04 · Sumarse al cambio<\u002Fdiv>\n      <h2>Sumarse <em>al cambio.<\u002Fem><\u002Fh2>\n      <div class=\"r\">— Aplica desde hoy<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ask-list\">\n      <article class=\"ask\">\n        <div class=\"n\">01 / Software<\u002Fdiv>\n        <h3>No compren <em>por su cuenta.<\u002Fem><\u002Fh3>\n        <p>\n          Pasen primero con TI — estamos consolidando licencias\n          a nivel grupo. Comprar individual nos sale más caro y\n          deja datos fuera del control del grupo.\n        <\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"ask\">\n        <div class=\"n\">02 / Seguridad<\u002Fdiv>\n        <h3>Cuiden los datos <em>del grupo.<\u002Fem><\u002Fh3>\n        <p>\n          Cuando lleguen las nuevas reglas (doble factor, prueba\n          de phishing, accesos), sigan los pasos. No es trámite —\n          es protección al patrimonio.\n        <\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"ask\">\n        <div class=\"n\">03 / Cambio<\u002Fdiv>\n        <h3>Apertura al cambio, <em>con paciencia.<\u002Fem><\u002Fh3>\n        <p>\n          Notion, juntas distintas, procesos nuevos. La curva\n          de aprendizaje vale la pena. Si algo no se entiende,\n          háblenlo con su jefe directo.\n        <\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ROADMAP (DARK) ============== -->\n<section class=\"dark roadmap\" data-screen-label=\"06 Qué sigue\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">— 05 · Qué sigue<\u002Fdiv>\n      <h2>Los siguientes pasos <em>de este año.<\u002Fem><\u002Fh2>\n      <div class=\"r\">— Calendario tentativo<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"timeline\">\n      <div class=\"timeline-line\"><\u002Fdiv>\n      <div class=\"timeline-grid\">\n        <div class=\"tstop now\">\n          <div class=\"when\">13–15 Mayo 2026 — Ahora<\u002Fdiv>\n          <div class=\"node\"><\u002Fdiv>\n          <div class=\"label\">Offsite 1T<\u002Fdiv>\n          <div class=\"desc\">Alineación y decisiones. Donde estamos hoy.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tstop\">\n          <div class=\"when\">Finales de Mayo 2026<\u002Fdiv>\n          <div class=\"node\"><\u002Fdiv>\n          <div class=\"label\">Presentación del proyecto<\u002Fdiv>\n          <div class=\"desc\">Datos y Tecnología a nivel grupo.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tstop now\">\n          <div class=\"when\">18 Mayo — Dic 2026 · En curso<\u002Fdiv>\n          <div class=\"node\"><\u002Fdiv>\n          <div class=\"label\">Implementación · Datos y Tecnología<\u002Fdiv>\n          <div class=\"desc\">Proyecto activo todo el semestre, de mayo a diciembre.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tstop\">\n          <div class=\"when\">Julio — Agosto 2026<\u002Fdiv>\n          <div class=\"node\"><\u002Fdiv>\n          <div class=\"label\">Offsite entre direcciones<\u002Fdiv>\n          <div class=\"desc\">Presupuesto, PLP y objetivos.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Closing -->\n  <div class=\"wrap closing\">\n    <div class=\"closing-grid\">\n      <div class=\"body\">\n        <p>\n          En las próximas semanas, <strong>cada dirección les va a contar\n          cómo los afecta a ustedes en lo concreto.<\u002Fstrong> Si tienen dudas,\n          hablen con su jefe directo — y si quieren entender mejor el\n          panorama completo, este comunicado va a vivir en el Notion GGM.\n        <\u002Fp>\n        <p>\n          Gracias por el compromiso de siempre. Lo que decidimos\n          en Santiago no fue una agenda nueva: fue ponerle nombre,\n          fechas y disciplina al trabajo que ya hacen.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"sign\">\n        <div class=\"line\">Vamos hacia adelante, <em>juntos.<\u002Fem><\u002Fdiv>\n        <div class=\"who\">\n          <b>Dirección General GGM<\u002Fb>\n          GM Capital · GM Desarrollos\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <footer class=\"dark\">\n    <div class=\"wrap foot-row\">\n      <div><b>Grupo Garza Mercado<\u002Fb> &nbsp; · &nbsp; Comunicado interno<\u002Fdiv>\n      <div>Mayo 2026 &nbsp; · &nbsp; v1.0<\u002Fdiv>\n      <div style=\"text-align:right;\">GGM®<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fsection>\n\n<script>\n  // Populate commit-viz SVGs from HTML context (not inside <svg>, which would\n  // mis-parse `<` operators as element starts).\n  (function(){\n    const ns = \"http://www.w3.org/2000/svg\";\n\n    // --- 01 / messy → ordered grid ---\n    (function order(){\n      const wrap = document.querySelector('[data-viz=\"order\"]');\n      if(!wrap) return;\n      const messy = wrap.querySelector('#messy-grid');\n      const ordered = wrap.querySelector('#ordered-grid');\n      let s = 42;\n      const rnd = () => (s = (s*9301 + 49297) % 233280) / 233280;\n      for (let y = 0; y < 7; y++){\n        for (let x = 0; x < 11; x++){\n          if (rnd() < 0.85){\n            const px = 20 + x*15 + (rnd()-0.5)*4;\n            const py = 15 + y*13 + (rnd()-0.5)*4;\n            const r = document.createElementNS(ns,'rect');\n            const sz = rnd() < 0.5 ? 2 : 3.2;\n            r.setAttribute('x', px - sz/2);\n            r.setAttribute('y', py - sz/2);\n            r.setAttribute('width', sz);\n            r.setAttribute('height', sz);\n            r.setAttribute('fill-opacity', 0.4 + rnd()*0.6);\n            messy.appendChild(r);\n          }\n        }\n      }\n      for (let y = 0; y < 7; y++){\n        for (let x = 0; x < 11; x++){\n          const c = document.createElementNS(ns,'circle');\n          c.setAttribute('cx', 290 + x*15);\n          c.setAttribute('cy', 15 + y*13);\n          c.setAttribute('r', 1.6);\n          c.setAttribute('fill-opacity', 0.9);\n          ordered.appendChild(c);\n        }\n      }\n    })();\n\n    // --- 04 / neural net 4-5-5-4 ---\n    (function net(){\n      const wrap = document.querySelector('[data-viz=\"net\"]');\n      if(!wrap) return;\n      const g = wrap.querySelector('#net');\n      const layers = [4,5,5,4];\n      const xStart = 50, xEnd = 430, yTop = 25, yBot = 95;\n      const cols = layers.length;\n      const pts = [];\n      for (let i = 0; i < cols; i++){\n        const x = xStart + (xEnd - xStart) * (i / (cols - 1));\n        const n = layers[i];\n        const col = [];\n        for (let j = 0; j < n; j++){\n          const y = yTop + (yBot - yTop) * (j / (n - 1));\n          col.push({x, y});\n        }\n        pts.push(col);\n      }\n      for (let i = 0; i < cols - 1; i++){\n        for (const a of pts[i]){\n          for (const b of pts[i+1]){\n            const l = document.createElementNS(ns,'line');\n            l.setAttribute('x1', a.x); l.setAttribute('y1', a.y);\n            l.setAttribute('x2', b.x); l.setAttribute('y2', b.y);\n            g.appendChild(l);\n          }\n        }\n      }\n      for (const col of pts){\n        for (const p of col){\n          const c = document.createElementNS(ns,'circle');\n          c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', 2);\n          g.appendChild(c);\n        }\n      }\n    })();\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
